services:
  zig-publisher:
    image: debian:bookworm-slim
    volumes:
      - ../../zig-out/bin:/usr/local/bin:ro
    environment:
      AERON_CHANNEL: "aeron:udp?endpoint=java-subscriber:20121"
      AERON_STREAM_ID: "1001"
      AERON_MSG_COUNT: "10"
      AERON_INTEROP_STUB: "${AERON_INTEROP_STUB:-0}"
    command: zig-publisher
    depends_on:
      - java-subscriber

  java-subscriber:
    image: eclipse-temurin:21-jdk
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      AERON_CHANNEL: "aeron:udp?endpoint=0.0.0.0:20121"
      AERON_STREAM_ID: "1001"
      AERON_MSG_COUNT: "10"
      AERON_INTEROP_STUB: "${AERON_INTEROP_STUB:-0}"
    command: >
      sh -c "javac JavaSubscriber.java && java JavaSubscriber"
