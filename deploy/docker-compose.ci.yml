services:
  zig-driver:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    networks: [aeron]
    volumes:
      - aeron_data:/aeron_data
    environment:
      AERON_DIR: /aeron_data
      AERON_TERM_BUFFER_LENGTH: "65536"
    healthcheck:
      test: ["CMD", "test", "-f", "/aeron_data/cnc.dat"]
      interval: 2s
      timeout: 5s
      retries: 10

  java-client:
    build:
      context: .
      dockerfile: Dockerfile.java-aeron
      args:
        AERON_VERSION: "${AERON_VERSION:-1.46.7}"
    networks: [aeron]
    volumes:
      - aeron_data:/aeron_data
    depends_on:
      zig-driver:
        condition: service_healthy
    environment:
      AERON_DIR: /aeron_data
      MSG_COUNT: "${MSG_COUNT:-10}"

networks:
  aeron:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  aeron_data:
