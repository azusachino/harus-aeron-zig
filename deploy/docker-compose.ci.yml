services:
  zig-driver:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        ZIG_BUILD_ENV_IMAGE: "${ZIG_BUILD_ENV_IMAGE:-nixos/nix:latest}"
    networks: [aeron]
    volumes:
      - aeron_shm:/dev/shm/aeron
    environment:
      AERON_DIR: /dev/shm/aeron
      AERON_TERM_BUFFER_LENGTH: "65536"

  java-client:
    build:
      context: .
      dockerfile: Dockerfile.java-aeron
      args:
        AERON_VERSION: "${AERON_VERSION:-1.50.2}"
    networks: [aeron]
    volumes:
      - aeron_shm:/dev/shm/aeron
    depends_on:
      zig-driver:
        condition: service_started
    environment:
      AERON_DIR: /dev/shm/aeron
      MSG_COUNT: "${MSG_COUNT:-10}"

networks:
  aeron:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  aeron_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1g"
