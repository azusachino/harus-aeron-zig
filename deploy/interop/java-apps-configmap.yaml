# ConfigMap containing Java Aeron smoke test apps for interop verification.
# Mounted as /mnt/apps in interop job containers.
# Used by: job-java-pub-zig-sub.yaml, job-zig-pub-java-sub.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: java-interop-apps
  namespace: aeron
data:
  BasicPublisher.java: |
    import io.aeron.Aeron;
    import io.aeron.Publication;
    import io.aeron.driver.MediaDriver;
    import org.agrona.concurrent.UnsafeBuffer;
    import java.nio.ByteBuffer;

    public class BasicPublisher {
        public static void main(String[] args) throws Exception {
            final String channel = System.getenv("CHANNEL");
            final int streamId = Integer.parseInt(System.getenv("STREAM_ID"));
            final String aeronDir = System.getenv("AERON_DIR");

            System.out.println("Launching Java Media Driver at " + aeronDir + "...");
            MediaDriver.Context driverCtx = new MediaDriver.Context()
                .aeronDirectoryName(aeronDir)
                .dirDeleteOnStart(true);

            try (MediaDriver driver = MediaDriver.launch(driverCtx)) {
                Thread.sleep(1000);
                try (Aeron aeron = Aeron.connect(new Aeron.Context().aeronDirectoryName(driver.aeronDirectoryName()));
                     Publication pub = aeron.addPublication(channel, streamId)) {

                    System.out.println("Java Publisher connected to " + channel);
                    UnsafeBuffer buffer = new UnsafeBuffer(ByteBuffer.allocateDirect(128));
                    for (int i = 0; i < 100; i++) {
                        String msg = "Hello Aeron " + i;
                        buffer.putStringWithoutLengthUtf8(0, msg);
                        while (pub.offer(buffer, 0, msg.length()) < 0) {
                            Thread.yield();
                        }
                        if (i % 10 == 0) System.out.println("Sent " + i + " messages...");
                    }
                    Thread.sleep(1000); // Wait for delivery
                    System.out.println("Java Publisher smoke test: SUCCESS (sent 100 messages)");
                }
            }
        }
    }
  BasicSubscriber.java: |
    import io.aeron.Aeron;
    import io.aeron.Subscription;
    import io.aeron.driver.MediaDriver;

    public class BasicSubscriber {
        public static void main(String[] args) throws Exception {
            final String channel = System.getenv("CHANNEL");
            final int streamId = Integer.parseInt(System.getenv("STREAM_ID"));
            final String aeronDir = System.getenv("AERON_DIR");

            System.out.println("Launching Java Media Driver at " + aeronDir + "...");
            MediaDriver.Context driverCtx = new MediaDriver.Context()
                .aeronDirectoryName(aeronDir)
                .dirDeleteOnStart(true);

            try (MediaDriver driver = MediaDriver.launch(driverCtx)) {
                Thread.sleep(1000);
                try (Aeron aeron = Aeron.connect(new Aeron.Context().aeronDirectoryName(driver.aeronDirectoryName()));
                     Subscription sub = aeron.addSubscription(channel, streamId)) {

                    System.out.println("Java Subscriber connected to " + channel);
                    int messagesReceived = 0;
                    while (messagesReceived < 100) {
                        final int fragments = sub.poll((buffer, offset, length, header) -> {
                            // Log message
                        }, 10);
                        messagesReceived += fragments;
                        if (fragments == 0) Thread.yield();
                    }
                    System.out.println("Java Subscriber smoke test: SUCCESS (received 100 messages)");
                }
            }
        }
    }
