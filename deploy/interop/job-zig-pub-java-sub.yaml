apiVersion: batch/v1
kind: Job
metadata:
  name: interop-zig-pub-java-sub
  namespace: aeron
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: zig-publisher
          image: harus-aeron-zig:latest
          imagePullPolicy: Never
          command: ["/opt/aeron/aeron-driver"]
          args: ["--publish", "--channel=aeron:udp?endpoint=java-sub:40123", "--stream-id=1001", "--messages=1000"]
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
        - name: java-subscriber
          image: java-aeron:latest
          imagePullPolicy: Never
          command: ["/opt/aeron/test-subscriber.sh"]
          env:
            - name: CHANNEL
              value: "aeron:udp?endpoint=0.0.0.0:40123"
            - name: STREAM_ID
              value: "1001"
            - name: MESSAGE_COUNT
              value: "1000"
            - name: TIMEOUT_SEC
              value: "60"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
