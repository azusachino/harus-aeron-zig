apiVersion: batch/v1
kind: Job
metadata:
  name: interop-zig-pub-java-sub
  namespace: aeron
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: zig-publisher
          image: harus-aeron-zig:latest
          imagePullPolicy: Never
          command: ["/bin/basic-publisher-interop"]
          env:
            - name: AERON_DIR
              value: "/dev/shm/aeron"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
        - name: java-subscriber
          image: java-aeron:latest
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              cat <<EOF > BasicSubscriber.java
              import io.aeron.Aeron;
              import io.aeron.Subscription;
              import io.aeron.driver.MediaDriver;
              import io.aeron.logbuffer.FragmentHandler;

              public class BasicSubscriber {
                  public static void main(String[] args) throws Exception {
                      final String channel = System.getenv("CHANNEL");
                      final int streamId = Integer.parseInt(System.getenv("STREAM_ID"));
                      final int count = Integer.parseInt(System.getenv("MESSAGE_COUNT"));
                      final String aeronDir = System.getenv("AERON_DIR");

                      System.out.println("Launching Java Media Driver at " + aeronDir + "...");
                      MediaDriver.Context driverCtx = new MediaDriver.Context()
                          .aeronDirectoryName(aeronDir)
                          .dirDeleteOnStart(true);

                      try (MediaDriver driver = MediaDriver.launch(driverCtx)) {
                           System.out.println("Driver launched, waiting 1s for CnC.dat...");
                           Thread.sleep(1000);
                           try (Aeron aeron = Aeron.connect(new Aeron.Context().aeronDirectoryName(driver.aeronDirectoryName()));
                                Subscription sub = aeron.addSubscription(channel, streamId)) {

                          System.out.println("Java Subscriber connected to " + channel);
                          final int[] received = {0};
                          FragmentHandler handler = (buffer, offset, length, header) -> {
                              received[0]++;
                              if (received[0] % 100 == 0) System.out.println("Received " + received[0] + " messages");
                          };

                          long start = System.currentTimeMillis();
                          while (received[0] < count) {
                              if (System.currentTimeMillis() - start > 60000) {
                                  System.out.println("ERROR: Java side timeout.");
                                  System.exit(1);
                              }
                              int fragments = sub.poll(handler, 10);
                              if (fragments == 0) Thread.sleep(1);
                          }
                          System.out.println("Java Subscriber finished receiving " + count + " messages.");
                        }
                    }
                }
              }
              EOF
              javac -cp /opt/aeron/aeron-all.jar BasicSubscriber.java
              java -cp .:/opt/aeron/aeron-all.jar BasicSubscriber
          env:
            - name: CHANNEL
              value: "aeron:udp?endpoint=localhost:40124"
            - name: STREAM_ID
              value: "1001"
            - name: MESSAGE_COUNT
              value: "1000"
            - name: AERON_DIR
              value: "/dev/shm/aeron"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
