apiVersion: batch/v1
kind: Job
metadata:
  name: interop-zig-pub-java-sub
  namespace: aeron
  labels:
    app.kubernetes.io/part-of: interop
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: interop
    spec:
      restartPolicy: Never
      containers:
        - name: zig-publisher
          image: harus-aeron-zig:latest
          imagePullPolicy: Never
          command: ["/bin/basic-publisher-interop"]
          env:
            - name: AERON_DIR
              value: "/dev/shm/zig"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
        - name: java-subscriber
          image: java-aeron:latest
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /dev/shm/java
              cp /mnt/apps/BasicSubscriber.java .
              javac -cp /opt/aeron/aeron-all.jar BasicSubscriber.java
              java -cp .:/opt/aeron/aeron-all.jar BasicSubscriber
          env:
            - name: CHANNEL
              value: "aeron:udp?endpoint=127.0.0.1:40124"
            - name: STREAM_ID
              value: "1001"
            - name: AERON_DIR
              value: "/dev/shm/java"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: apps
              mountPath: /mnt/apps
              readOnly: true
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: apps
          configMap:
            name: java-interop-apps
