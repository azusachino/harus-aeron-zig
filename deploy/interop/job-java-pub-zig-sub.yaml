apiVersion: batch/v1
kind: Job
metadata:
  name: interop-java-pub-zig-sub
  namespace: aeron
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: java-publisher
          image: java-aeron:latest
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              cat <<EOF > BasicPublisher.java
              import io.aeron.Aeron;
              import io.aeron.Publication;
              import io.aeron.driver.MediaDriver;
              import org.agrona.concurrent.UnsafeBuffer;
              import java.nio.ByteBuffer;

              public class BasicPublisher {
                  public static void main(String[] args) throws Exception {
                      final String channel = System.getenv("CHANNEL");
                      final int streamId = Integer.parseInt(System.getenv("STREAM_ID"));
                      final int count = Integer.parseInt(System.getenv("MESSAGE_COUNT"));
                      final String aeronDir = System.getenv("AERON_DIR");

                      System.out.println("Launching Java Media Driver at " + aeronDir + "...");
                      MediaDriver.Context driverCtx = new MediaDriver.Context()
                          .aeronDirectoryName(aeronDir)
                          .dirDeleteOnStart(true);

                      try (MediaDriver driver = MediaDriver.launch(driverCtx)) {
                           System.out.println("Driver launched, waiting 1s for CnC.dat...");
                           Thread.sleep(1000);
                           try (Aeron aeron = Aeron.connect(new Aeron.Context().aeronDirectoryName(driver.aeronDirectoryName()));
                                Publication pub = aeron.addPublication(channel, streamId)) {

                          System.out.println("Java Publisher connected to " + channel);
                          UnsafeBuffer buf = new UnsafeBuffer(ByteBuffer.allocateDirect(256));
                          
                          long start = System.currentTimeMillis();
                          for (int i = 0; i < count; i++) {
                              if (System.currentTimeMillis() - start > 60000) {
                                  System.out.println("ERROR: Java side timeout.");
                                  System.exit(1);
                              }
                              String msg = "message-" + i;
                              buf.putStringWithoutLengthAscii(0, msg);
                              while (pub.offer(buf, 0, msg.length()) < 0) {
                                  Thread.onSpinWait();
                                  if (System.currentTimeMillis() - start > 60000) System.exit(1);
                              }
                              if (i % 100 == 0) System.out.println("Offered " + i + " messages");
                          }
                          System.out.println("Java Publisher finished sending " + count + " messages.");
                        }
                    }
                }
              }
              EOF
              javac -cp /opt/aeron/aeron-all.jar BasicPublisher.java
              java -cp .:/opt/aeron/aeron-all.jar BasicPublisher
          env:
            - name: CHANNEL
              value: "aeron:udp?endpoint=localhost:40124"
            - name: STREAM_ID
              value: "1001"
            - name: MESSAGE_COUNT
              value: "1000"
            - name: AERON_DIR
              value: "/dev/shm/aeron"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
        - name: zig-subscriber
          image: harus-aeron-zig:latest
          imagePullPolicy: Never
          command: ["/bin/basic-subscriber-interop"]
          env:
            - name: AERON_DIR
              value: "/dev/shm/aeron"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
