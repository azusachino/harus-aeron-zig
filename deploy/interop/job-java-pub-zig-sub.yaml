apiVersion: batch/v1
kind: Job
metadata:
  name: interop-java-pub-zig-sub
  namespace: aeron
  labels:
    app.kubernetes.io/part-of: interop
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: interop
    spec:
      restartPolicy: Never
      containers:
        - name: java-publisher
          image: java-aeron:latest
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /dev/shm/java
              cp /mnt/apps/BasicPublisher.java .
              javac -cp /opt/aeron/aeron-all.jar BasicPublisher.java
              java -cp .:/opt/aeron/aeron-all.jar BasicPublisher
          env:
            - name: CHANNEL
              value: "aeron:udp?endpoint=127.0.0.1:40124"
            - name: STREAM_ID
              value: "1001"
            - name: AERON_DIR
              value: "/dev/shm/java"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: apps
              mountPath: /mnt/apps
              readOnly: true
        - name: zig-subscriber
          image: harus-aeron-zig:latest
          imagePullPolicy: Never
          command: ["/bin/basic-subscriber-interop"]
          env:
            - name: AERON_DIR
              value: "/dev/shm/zig"
            - name: LISTEN_PORT
              value: "40124"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: apps
          configMap:
            name: java-interop-apps
