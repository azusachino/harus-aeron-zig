apiVersion: batch/v1
kind: Job
metadata:
  name: interop-archive
  namespace: aeron
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: zig-publisher
          image: harus-aeron-zig:latest
          imagePullPolicy: Never
          command: ["/opt/aeron/aeron-driver"]
          args: ["--publish", "--channel=aeron:udp?endpoint=java-archive:40123", "--stream-id=2001", "--messages=500"]
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
        - name: java-archive
          image: java-aeron:latest
          imagePullPolicy: Never
          command: ["/opt/aeron/test-archive.sh"]
          env:
            - name: CHANNEL
              value: "aeron:udp?endpoint=0.0.0.0:40123"
            - name: STREAM_ID
              value: "2001"
            - name: MESSAGE_COUNT
              value: "500"
            - name: ARCHIVE_DIR
              value: "/var/lib/aeron-archive"
            - name: TIMEOUT_SEC
              value: "60"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: archive
              mountPath: /var/lib/aeron-archive
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: archive
          emptyDir:
            sizeLimit: 512Mi
